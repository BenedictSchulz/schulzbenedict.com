name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check types and style
        run: npm run check

      - name: Run tests
        run: npm test

      - name: Build site
        env:
          IMPRESSUM_NAME: CI Example
          IMPRESSUM_ADDRESS: Example Street 1
          IMPRESSUM_CITY: Example City
          IMPRESSUM_EMAIL: ci@example.com
        run: npm run build
